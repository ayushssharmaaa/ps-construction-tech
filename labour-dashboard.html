<!DOCTYPE html>

<html>
<head>
<title>My Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
padding:20px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:10px;
margin-bottom:10px;
}

button{
padding:10px;
border:none;
border-radius:8px;
margin-top:10px;
cursor:pointer;
}

</style>

</head>

<body>

<h2>👷 My Dashboard</h2>

<div class="card" id="data"></div>

<button onclick="changePassword()">🔐 Change Password</button> <button onclick="logout()">🚪 Logout</button>

<!-- ================= FIREBASE ================= -->

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, updateDoc, doc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDTpS1oqcwP26FEVJlg7UbN2uK6jlRdYx4",
  authDomain: "ps-construction-tech.firebaseapp.com",
  projectId: "ps-construction-tech"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 GET CURRENT USER ID
let labourId = localStorage.getItem("labourId");

let currentDocId = null;
let user = null;

// 🔥 LOAD DATA
async function loadUser(){

let snapshot = await getDocs(collection(db, "labours"));

snapshot.forEach(docSnap=>{
  let data = docSnap.data();

  if(data.id === labourId){
    user = data;
    currentDocId = docSnap.id;
  }
});

if(!user){
  alert("User not found ❌");
  return;
}

// 🔥 CALCULATE
let days = Object.values(user.attendance || {}).reduce((a,b)=>a+b,0);

let base = days * user.rate;

let ot = 0;
for(let d in user.overtime){
  ot += (user.rate/8) * user.overtime[d];
}

let total = base + ot;

// 🔥 SHOW DATA
document.getElementById("data").innerHTML = `
<b>ID:</b> ${user.id}<br>
<b>Name:</b> ${user.name}<br>
<b>Site:</b> ${user.site}<br><br>

<b>Total Days:</b> ${days}<br>
<b>Total Salary:</b> ₹${Math.round(total)}<br>
<b>Paid:</b> ₹${user.paid}<br>
<b>Pending:</b> ₹${Math.round(total - user.paid)}<br><br>

<b>Attendance:</b><br>
${Object.entries(user.attendance).map(([d,v])=>d+" → "+v).join("<br>") || "No data"}

<br><br>

<b>Overtime:</b><br>
${Object.entries(user.overtime).map(([d,v])=>d+" → "+v+" hrs").join("<br>") || "No OT"}
`;

}

loadUser();

// 🔐 CHANGE PASSWORD
window.changePassword = async function(){

let newPass = prompt("Enter new password");

if(!newPass) return;

await updateDoc(doc(db, "labours", currentDocId), {
  password: newPass
});

alert("Password Updated ✅");

};

// 🚪 LOGOUT
window.logout = function(){
localStorage.removeItem("labourId");
window.location.href = "login.html";
};

</script>

</body>
</html>
